<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart | Anantara SA</title>
    <link rel="icon" href="/images/app/favicon.png" />
    <link href="/dist/css/commons.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="/js/firebase-auth-cart.js"></script>
    <style>
      :root {
        --cream: #f6f5e8;
        --cream-warm: #fef6ec;
        --ink: #1a1a1a;
        --ink-muted: #5a5a5a;
        --ink-light: #9a9a9a;
        --border: #e0dfd6;
        --gold: #c9a96e;
        --gold-light: #e8d5b0;
        --white: #ffffff;
        --red: #c0392b;
        --font-serif: "Georgia", "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--cream);
        color: var(--ink);
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 15px;
        line-height: 1.6;
        min-height: 100vh;
      }

      /* ── HEADER (minimal matching site header) ── */
      .page-header {
        background: var(--ink);
        padding: 0 40px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .page-header a {
        text-decoration: none;
      }
      .header-logo {
        color: var(--white);
        font-family: var(--font-serif);
        font-size: 22px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .header-nav {
        display: flex;
        gap: 28px;
        align-items: center;
      }
      .header-nav a {
        color: rgba(255, 255, 255, 0.75);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-decoration: none;
        transition: color 0.2s;
      }
      .header-nav a:hover {
        color: var(--white);
      }

      /* ── PAGE WRAPPER ── */
      .cart-page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 60px 40px 100px;
      }

      /* ── BREADCRUMB ── */
      .breadcrumb {
        font-size: 12px;
        color: var(--ink-light);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 40px;
      }
      .breadcrumb a {
        color: var(--ink-light);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--ink);
      }
      .breadcrumb span {
        margin: 0 8px;
      }

      /* ── PAGE TITLE ── */
      .cart-title {
        font-family: var(--font-serif);
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 400;
        letter-spacing: 0.04em;
        margin-bottom: 8px;
      }
      .cart-subtitle {
        color: var(--ink-muted);
        font-size: 14px;
        margin-bottom: 48px;
      }

      /* ── GRID ── */
      .cart-grid {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 48px;
        align-items: start;
      }
      @media (max-width: 900px) {
        .cart-grid {
          grid-template-columns: 1fr;
        }
        .cart-page {
          padding: 40px 20px 80px;
        }
        .page-header {
          padding: 0 20px;
        }
      }

      /* ── LOADING STATE ── */
      .cart-loading {
        text-align: center;
        padding: 80px 40px;
        color: var(--ink-muted);
      }
      .loading-spinner {
        width: 36px;
        height: 36px;
        border: 2px solid var(--border);
        border-top-color: var(--ink);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── EMPTY STATE ── */
      .cart-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 100px 40px;
      }
      .cart-empty-icon {
        font-size: 48px;
        margin-bottom: 24px;
        opacity: 0.3;
      }
      .cart-empty h2 {
        font-family: var(--font-serif);
        font-size: 26px;
        font-weight: 400;
        margin-bottom: 12px;
      }
      .cart-empty p {
        color: var(--ink-muted);
        margin-bottom: 32px;
      }

      /* ── CART ITEMS ── */
      .cart-items-header {
        display: grid;
        grid-template-columns: 1fr 120px 120px 48px;
        gap: 16px;
        padding: 0 0 12px;
        border-bottom: 1px solid var(--border);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-light);
        margin-bottom: 4px;
      }
      @media (max-width: 600px) {
        .cart-items-header {
          display: none;
        }
      }

      .cart-item {
        display: grid;
        grid-template-columns: 100px 1fr 120px 120px 48px;
        gap: 20px;
        align-items: center;
        padding: 24px 0;
        border-bottom: 1px solid var(--border);
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      @media (max-width: 600px) {
        .cart-item {
          grid-template-columns: 80px 1fr 40px;
          grid-template-rows: auto auto;
          gap: 12px;
        }
        .cart-item-qty,
        .cart-item-subtotal {
          grid-column: 2;
        }
      }

      .cart-item-image {
        width: 100px;
        height: 100px;
        object-fit: cover;
        background: var(--cream-warm);
        display: block;
      }
      .cart-item-image.placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        color: var(--border);
      }

      .cart-item-info {
      }
      .cart-item-name {
        font-family: var(--font-serif);
        font-size: 16px;
        font-weight: 400;
        margin-bottom: 4px;
      }
      .cart-item-subname {
        font-size: 13px;
        color: var(--ink-muted);
        margin-bottom: 4px;
      }
      .cart-item-size {
        font-size: 12px;
        color: var(--ink-light);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .cart-item-price {
        font-size: 15px;
        color: var(--ink-muted);
      }

      .cart-item-qty {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .qty-btn {
        width: 28px;
        height: 28px;
        background: none;
        border: 1px solid var(--border);
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        color: var(--ink);
      }
      .qty-btn:hover {
        background: var(--ink);
        color: var(--white);
        border-color: var(--ink);
      }
      .qty-val {
        min-width: 28px;
        text-align: center;
        font-size: 15px;
      }

      .cart-item-subtotal {
        font-size: 15px;
        font-weight: 600;
      }

      .cart-item-remove {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--ink-light);
        font-size: 18px;
        padding: 4px;
        transition: color 0.2s;
        line-height: 1;
      }
      .cart-item-remove:hover {
        color: var(--red);
      }

      /* ── ORDER SUMMARY ── */
      .order-summary {
        background: var(--white);
        border: 1px solid var(--border);
        padding: 36px;
        position: sticky;
        top: 80px;
      }
      .summary-title {
        font-family: var(--font-serif);
        font-size: 20px;
        font-weight: 400;
        margin-bottom: 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
        font-size: 14px;
      }
      .summary-row.total {
        border-top: 1px solid var(--border);
        padding-top: 16px;
        margin-top: 8px;
        font-size: 17px;
        font-weight: 600;
      }
      .summary-label {
        color: var(--ink-muted);
      }
      .summary-label.total {
        color: var(--ink);
      }
      .free-badge {
        background: var(--cream);
        color: var(--ink);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 3px 8px;
      }

      /* ── PROMO CODE ── */
      .promo-section {
        margin: 20px 0 24px;
        padding: 20px 0;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }
      .promo-section label {
        display: block;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-muted);
        margin-bottom: 10px;
      }
      .promo-row {
        display: flex;
        gap: 8px;
      }
      .promo-input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--border);
        background: var(--cream);
        font-size: 14px;
        outline: none;
        font-family: inherit;
        transition: border-color 0.2s;
      }
      .promo-input:focus {
        border-color: var(--ink);
      }
      .promo-btn {
        padding: 10px 18px;
        background: none;
        border: 1px solid var(--ink);
        cursor: pointer;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-family: inherit;
        transition: all 0.2s;
      }
      .promo-btn:hover {
        background: var(--ink);
        color: var(--white);
      }

      /* ── CHECKOUT BUTTON ── */
      .checkout-btn {
        display: block;
        width: 100%;
        padding: 16px;
        background: var(--ink);
        color: var(--white);
        border: none;
        cursor: pointer;
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-family: inherit;
        transition: background 0.2s;
        margin-bottom: 12px;
      }
      .checkout-btn:hover {
        background: #333;
      }
      .checkout-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .continue-link {
        display: block;
        text-align: center;
        font-size: 13px;
        color: var(--ink-muted);
        text-decoration: none;
        letter-spacing: 0.04em;
      }
      .continue-link:hover {
        color: var(--ink);
        text-decoration: underline;
      }

      /* ── TRUST SIGNALS ── */
      .trust-row {
        display: flex;
        gap: 16px;
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }
      .trust-item {
        flex: 1;
        text-align: center;
        font-size: 11px;
        color: var(--ink-light);
        letter-spacing: 0.04em;
        line-height: 1.4;
      }
      .trust-item .icon {
        font-size: 18px;
        margin-bottom: 4px;
        display: block;
      }

      /* ── YOU MAY ALSO LIKE ── */
      .upsell-section {
        margin-top: 64px;
      }
      .upsell-title {
        font-family: var(--font-serif);
        font-size: 22px;
        font-weight: 400;
        margin-bottom: 28px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }

      /* ── NOTIFICATION ── */
      .notification {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--ink);
        color: var(--white);
        padding: 12px 24px;
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s;
        z-index: 1000;
        pointer-events: none;
      }
      .notification.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── SIGN-IN NUDGE ── */
      .signin-nudge {
        background: var(--cream-warm);
        border: 1px solid var(--gold-light);
        padding: 16px 20px;
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 14px;
      }
      .signin-nudge a {
        color: var(--ink);
        font-weight: 600;
        text-decoration: underline;
      }

      .btn-secondary {
        display: inline-block;
        padding: 12px 28px;
        border: 1px solid var(--ink);
        background: none;
        color: var(--ink);
        font-size: 13px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }
      .btn-secondary:hover {
        background: var(--ink);
        color: var(--white);
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <header class="page-header">
      <a href="/" class="header-logo">Anantara</a>
      <nav class="header-nav">
        <a href="/fragrance.html">Fragrance</a>
        <a href="/skin-care.html">Skin Care</a>
        <a href="/gifts.html">Gifts</a>
        <a href="/login.html">Account</a>
      </nav>
    </header>

    <div class="cart-page">
      <!-- BREADCRUMB -->
      <div class="breadcrumb">
        <a href="/">Home</a><span>›</span>
        <a href="/fragrance.html">Fragrance</a><span>›</span>
        My Cart
      </div>

      <!-- TITLE -->
      <h1 class="cart-title">My Cart</h1>
      <p class="cart-subtitle" id="cart-count-text">Loading your cart…</p>

      <!-- SIGN-IN NUDGE (shown for guests) -->
      <div class="signin-nudge" id="signin-nudge" style="display: none">
        <span>🔐</span>
        <span
          >Sign in to save your cart and access exclusive member benefits.
          <a href="/login.html">Sign in</a> or
          <a href="/signup.html">create an account</a>.</span
        >
      </div>

      <!-- MAIN GRID -->
      <div class="cart-grid" id="cart-grid">
        <!-- Loading -->
        <div class="cart-loading" id="cart-loading">
          <div class="loading-spinner"></div>
          <p>Fetching your selections…</p>
        </div>
      </div>
    </div>

    <!-- NOTIFICATION -->
    <div class="notification" id="notification"></div>

    <script>
      const WORKER = "https://anantara-cart.anantara-skin.workers.dev";

      // ── HELPERS ──────────────────────────────────────────────────
      function getToken() {
        return (
          document.cookie
            .split(";")
            .map((c) => c.trim())
            .find((c) => c.startsWith("cart_token="))
            ?.split("=")[1] ||
          localStorage.getItem("cart_token") ||
          null
        );
      }

      async function getFBToken() {
        try {
          if (typeof AnantaraAuth !== "undefined" && AnantaraAuth.getIdToken)
            return await AnantaraAuth.getIdToken();
        } catch {}
        return null;
      }

      function fmt(n) {
        return "R" + Number(n).toFixed(2);
      }

      function notify(msg) {
        const el = document.getElementById("notification");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2500);
      }

      // ── FETCH CART ───────────────────────────────────────────────
      async function loadCart() {
        const token = getToken();
        const fbToken = await getFBToken();
        const headers = {};
        if (token) headers["X-Cart-Token"] = token;
        if (fbToken) headers["Authorization"] = `Bearer ${fbToken}`;

        const res = await fetch(WORKER + "/cart", {
          credentials: "include",
          headers,
        });
        return res.json();
      }

      // ── REMOVE ITEM ──────────────────────────────────────────────
      async function removeItem(pid, size) {
        const token = getToken();
        const fbToken = await getFBToken();
        const headers = { "Content-Type": "application/json" };
        if (token) headers["X-Cart-Token"] = token;
        if (fbToken) headers["Authorization"] = `Bearer ${fbToken}`;

        await fetch(WORKER + "/cart/remove", {
          method: "POST",
          credentials: "include",
          headers,
          body: JSON.stringify({ pid, size }),
        });
        await renderCart();
        notify("Item removed from cart");
      }

      // ── UPDATE QTY ───────────────────────────────────────────────
      async function updateQty(pid, size, qty) {
        const token = getToken();
        const fbToken = await getFBToken();
        const headers = { "Content-Type": "application/json" };
        if (token) headers["X-Cart-Token"] = token;
        if (fbToken) headers["Authorization"] = `Bearer ${fbToken}`;

        await fetch(WORKER + "/cart/update", {
          method: "POST",
          credentials: "include",
          headers,
          body: JSON.stringify({ pid, size, qty }),
        });
        await renderCart();
      }

      // ── RENDER ───────────────────────────────────────────────────
      async function renderCart() {
        const grid = document.getElementById("cart-grid");
        const countText = document.getElementById("cart-count-text");

        let cart;
        try {
          cart = await loadCart();
        } catch (e) {
          grid.innerHTML = `<div style="color:#c0392b;padding:40px">Unable to load cart. Please refresh.</div>`;
          return;
        }

        const items = cart.items || [];
        const isGuest = !cart.uid;

        // Show nudge for guests who have items
        if (isGuest && items.length > 0)
          document.getElementById("signin-nudge").style.display = "flex";

        if (items.length === 0) {
          countText.textContent = "Your cart is empty";
          grid.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛍</div>
        <h2>Your cart awaits</h2>
        <p>Discover our collection of fine fragrances and skincare.</p>
        <a href="/fragrance.html" class="btn-secondary">Explore Fragrances</a>
      </div>`;
          return;
        }

        countText.textContent = `${items.length} item${items.length !== 1 ? "s" : ""} in your cart`;

        const subtotal = items.reduce((s, i) => s + i.price * (i.qty || 1), 0);
        const shipping = subtotal >= 800 ? 0 : 99;
        const total = subtotal + shipping;

        // Items HTML
        const itemsHTML = items
          .map((item) => {
            const sub = item.price * (item.qty || 1);
            const img = item.imageUrl
              ? `<img class="cart-item-image" src="${item.imageUrl}" alt="${item.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
              : "";
            return `
      <div class="cart-item" data-pid="${item.pid}" data-size="${item.size || ""}">
        ${img}
        <div class="cart-item-image placeholder" style="${item.imageUrl ? "display:none" : ""}">🌸</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          ${item.subname ? `<div class="cart-item-subname">${item.subname}</div>` : ""}
          ${item.size ? `<div class="cart-item-size">${item.size}</div>` : ""}
        </div>
        <div class="cart-item-price">${fmt(item.price)}</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="updateQty('${item.pid}','${item.size || ""}',${(item.qty || 1) - 1})" aria-label="Decrease">−</button>
          <span class="qty-val">${item.qty || 1}</span>
          <button class="qty-btn" onclick="updateQty('${item.pid}','${item.size || ""}',${(item.qty || 1) + 1})" aria-label="Increase">+</button>
        </div>
        <div class="cart-item-subtotal">${fmt(sub)}</div>
        <button class="cart-item-remove" onclick="removeItem('${item.pid}','${item.size || ""}')" aria-label="Remove item">×</button>
      </div>`;
          })
          .join("");

        grid.innerHTML = `
    <!-- LEFT: Items -->
    <div>
      <div class="cart-items-header">
        <div>Product</div>
        <div></div>
        <div>Price</div>
        <div>Qty</div>
      </div>
      ${itemsHTML}
    </div>

    <!-- RIGHT: Summary -->
    <div class="order-summary">
      <h2 class="summary-title">Order Summary</h2>

      <div class="summary-row">
        <span class="summary-label">Subtotal</span>
        <span>${fmt(subtotal)}</span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Shipping</span>
        ${
          shipping === 0
            ? `<span class="free-badge">Free</span>`
            : `<span>${fmt(shipping)}</span>`
        }
      </div>
      ${shipping > 0 ? `<div style="font-size:12px;color:var(--ink-light);margin-bottom:12px;">Free shipping on orders over R800</div>` : ""}
      <div class="summary-row total">
        <span class="summary-label total">Total</span>
        <span>${fmt(total)}</span>
      </div>

      <div class="promo-section">
        <label for="promo-input">Promotional code</label>
        <div class="promo-row">
          <input class="promo-input" id="promo-input" type="text" placeholder="Enter code">
          <button class="promo-btn">Apply</button>
        </div>
      </div>

      <button class="checkout-btn" id="checkout-btn" onclick="proceedToCheckout()">
        Proceed to Checkout
      </button>
      <a href="/fragrance.html" class="continue-link">← Continue Shopping</a>

      <div class="trust-row">
        <div class="trust-item"><span class="icon">🔒</span>Secure Checkout</div>
        <div class="trust-item"><span class="icon">📦</span>Free Returns</div>
        <div class="trust-item"><span class="icon">🎁</span>Gift Wrapping</div>
      </div>
    </div>`;

        // Store cart data for checkout
        window._cartData = { items, subtotal, total };
      }

      // ── CHECKOUT ─────────────────────────────────────────────────
      async function proceedToCheckout() {
        const btn = document.getElementById("checkout-btn");
        btn.disabled = true;
        btn.textContent = "Please wait…";

        const fbToken = await getFBToken();
        if (!fbToken) {
          // Save return URL and redirect to login
          localStorage.setItem("checkout_redirect", "/checkout.html");
          window.location.href = "/login.html?redirect=checkout";
          return;
        }

        // Redirect to checkout page
        window.location.href = "/checkout.html";
      }

      // ── INIT ─────────────────────────────────────────────────────
      renderCart();
    </script>
  </body>
</html>
