<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart | Anantara</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      .continue-shopping { color: #965000; text-decoration: none; font-size: 0.9rem; transition: opacity 0.3s; }
      .continue-shopping:hover { opacity: 0.7; }

      .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
      .breadcrumb { font-size: 0.85rem; color: #666; margin-bottom: 2rem; }
      .breadcrumb a { color: #965000; text-decoration: none; }

      h1 { font-size: 2.5rem; margin-bottom: 2rem; color: #965000; font-weight: 500; }

      .cart-layout { display: grid; grid-template-columns: 1fr 400px; gap: 2rem; }

      .cart-items { background: white; padding: 2rem; border-radius: 4px; }

      .empty-cart { text-align: center; padding: 4rem 2rem; }
      .empty-cart-icon { font-size: 4rem; color: #ddd; margin-bottom: 1rem; }

      .cart-item { display: grid; grid-template-columns: 120px 1fr auto; gap: 1.5rem; padding: 1.5rem 0; border-bottom: 1px solid #eee; }
      .cart-item:last-child { border-bottom: none; }

      .item-image { width: 120px; height: 120px; object-fit: cover; border-radius: 4px; background: #f5f5f5; }

      .item-details { display: flex; flex-direction: column; justify-content: space-between; }
      .item-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.5rem; color: #333; }
      .item-variant { font-size: 0.9rem; color: #666; margin-bottom: 0.5rem; }
      .item-price { font-size: 1rem; color: #965000; font-weight: 500; }

      .quantity-controls { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
      .qty-btn { width: 32px; height: 32px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 1.2rem; border-radius: 4px; transition: all 0.3s; }
      .qty-btn:hover { background: #f5f5f5; border-color: #965000; }
      .qty-input { width: 50px; text-align: center; border: 1px solid #ddd; padding: 0.5rem; border-radius: 4px; }

      .item-actions { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }
      .remove-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 1.5rem; padding: 0.5rem; transition: color 0.3s; }
      .remove-btn:hover { color: #d32f2f; }
      .item-total { font-size: 1.2rem; font-weight: 500; color: #333; }

      .cart-summary { background: white; padding: 2rem; border-radius: 4px; height: fit-content; position: sticky; top: 100px; }
      .summary-title { font-size: 1.5rem; margin-bottom: 1.5rem; font-weight: 500; }
      .summary-row { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid #eee; }
      .summary-row.total { border-bottom: none; border-top: 2px solid #333; margin-top: 1rem; padding-top: 1rem; font-size: 1.2rem; font-weight: 600; }

      .promo-code { margin: 1.5rem 0; }
      .promo-input { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
      .promo-input input { flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; }
      .promo-btn { padding: 0.75rem 1.5rem; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.3s; }
      .promo-btn:hover { background: #555; }

      .checkout-btn { width: 100%; padding: 1.25rem; background: #965000; color: white; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: 500; cursor: pointer; margin-top: 1.5rem; transition: background 0.3s; }
      .checkout-btn:hover { background: #7a4000; }
      .checkout-btn:disabled { background: #ccc; cursor: not-allowed; }

      .secure-checkout { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #666; }

      /* Loading & error states */
      .cart-loading { text-align: center; padding: 3rem; color: #666; }
      .cart-loading-spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #965000; border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 1rem; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .cart-error { background: #fff3f3; border: 1px solid #f5c6c6; color: #c0392b; padding: 1rem 1.5rem; border-radius: 4px; margin-bottom: 1rem; font-size: 0.9rem; }

      .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 0.75rem 1.5rem; border-radius: 4px; font-size: 0.9rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9999; }
      .toast.show { opacity: 1; }

      @media (max-width: 968px) {
        .cart-layout { grid-template-columns: 1fr; }
        .cart-summary { position: static; }
      }
      @media (max-width: 640px) {
        .cart-item { grid-template-columns: 80px 1fr; gap: 1rem; }
        .item-image { width: 80px; height: 80px; }
        .item-actions { grid-column: 2; flex-direction: row; align-items: center; justify-content: space-between; }
        h1 { font-size: 1.8rem; }
      }
    </style>
  </head>
  <body>

    <!-- ── HEADER (unchanged) ─────────────────────────────── -->
    <header class="l-header" data-js-header data-component-options='{"hideOnScroll":true}' data-component-force>
      <div class="l-header__inner" data-js-header-inner>
        <div class="l-header__main-area-wrapper">
          <div class="l-header__main-area" data-js-anchor>
            <div class="l-header__logo">
              <a class="c-logo" href="/" aria-label="Anantara - Go to the homepage">
                <img src="/images/app/favicon.png" width="120" height="auto" alt="Anantara" style="max-height:40px;object-fit:contain;" />
              </a>
            </div>
            <div class="l-header__top-nav m-right">
              <ul class="l-header__top-nav-list">
                <li class="l-header__top-nav-item m-account">
                  <a rel="nofollow" class="c-user__link m-login" href="/login.html">
                    <span class="c-user__text m-login">Account</span>
                  </a>
                </li>
                <li class="l-header__top-nav-item m-minicart">
                  <button class="c-minicart-icon__link" type="button" onclick="window.location.href='/mycart.html'" aria-label="View cart">
                    <span class="c-minicart-icon__label">My cart</span>
                    <span class="c-minicart-icon__qty" id="headerCartQty" aria-hidden="true">0</span>
                  </button>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- ── END HEADER ─────────────────────────────────────── -->

    <div class="container">
      <div class="breadcrumb">
        <a href="/">Home</a> / <span>Shopping Cart</span>
      </div>

      <h1>My Cart <span id="itemCount">(0)</span></h1>

      <!-- Loading state -->
      <div id="cartLoading" class="cart-items cart-loading">
        <div class="cart-loading-spinner"></div>
        <p>Loading your cart…</p>
      </div>

      <!-- Error state -->
      <div id="cartError" class="cart-error" style="display:none;"></div>

      <!-- Empty state -->
      <div id="emptyCartMessage" class="cart-items empty-cart" style="display:none;">
        <div class="empty-cart-icon">🛒</div>
        <h2>Your cart is empty</h2>
        <p style="margin:1rem 0;color:#666;">Looks like you haven't added anything to your cart yet.</p>
        <a href="/" style="display:inline-block;margin-top:1rem;padding:1rem 2rem;background:#965000;color:white;text-decoration:none;border-radius:4px;">Start Shopping</a>
      </div>

      <!-- Cart content -->
      <div id="cartContent" class="cart-layout" style="display:none;">
        <div class="cart-items" id="cartItemsContainer"></div>

        <div class="cart-summary">
          <h2 class="summary-title">Order Summary</h2>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">R 0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span id="shipping">FREE</span>
          </div>

          <div class="promo-code">
            <label style="font-size:0.9rem;color:#666;">Promo Code</label>
            <div class="promo-input">
              <input type="text" id="promoInput" placeholder="Enter code" />
              <button class="promo-btn" onclick="applyPromo()">Apply</button>
            </div>
          </div>

          <div class="summary-row" id="discountRow" style="display:none;color:#4caf50;">
            <span>Discount</span>
            <span id="discount">-R 0.00</span>
          </div>

          <div class="summary-row total">
            <span>Total</span>
            <span id="total">R 0.00</span>
          </div>

          <button class="checkout-btn" id="checkoutBtn" onclick="proceedToCheckout()">
            Proceed to Checkout
          </button>

          <div class="secure-checkout">🔒 Secure Checkout</div>
        </div>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <!-- Firebase + Auth scripts (keep your existing ones) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="/js/firebase-auth-cart.js"></script>

    <script>
      // ── CONFIG ────────────────────────────────────────────
      // Replace with your actual Cloudflare Worker URL
      const WORKER_URL = 'https://anantara-cart.anantara-skin.workers.dev';

      // ── PROMO STATE ───────────────────────────────────────
      let promoDiscount = 0;

      // ── TOAST HELPER ──────────────────────────────────────
      function showToast(msg, duration = 2500) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), duration);
      }

      // ── TOKEN HELPERS ─────────────────────────────────────
      function getCartToken() {
  // 1. Try cookie first
  const fromCookie = document.cookie
    .split(';')
    .map(c => c.trim())
    .find(c => c.startsWith('cart_token='))
    ?.split('=')[1] || null;

  // 2. Fallback to localStorage (needed on HTTP / local dev)
  return fromCookie || localStorage.getItem('cart_token') || null;
}

      function getFirebaseToken() {
        // AnantaraAuth is initialised by /js/firebase-auth-cart.js
        return typeof AnantaraAuth !== 'undefined'
          ? AnantaraAuth.getIdToken?.() || null
          : null;
      }

      // ── API HELPERS ───────────────────────────────────────
      async function buildHeaders() {
  const h = { 'Content-Type': 'application/json' };
  const token = getCartToken();
  if (token) h['X-Cart-Token'] = token;

  // ✅ getIdToken() is async — must be awaited
  const fbToken = typeof AnantaraAuth !== 'undefined'
    ? await AnantaraAuth.getIdToken?.()   // await the Promise
    : null;
  if (fbToken) h['Authorization'] = `Bearer ${fbToken}`;
  return h;
}

      async function workerFetch(path, options = {}) {
        const headers = await buildHeaders();
        const res = await fetch(WORKER_URL + path, {
          ...options,
          credentials: 'include',
          headers: { ...headers, ...(options.headers || {}) },
        });
        if (!res.ok) throw new Error(`Worker error ${res.status}`);
        return res.json();
      }

      // ── FETCH CART ────────────────────────────────────────
      async function fetchCart() {
  showLoading(true);
  clearError();
  try {
    const data = await workerFetch('/cart', { method: 'GET' });

    // ✅ Persist token so future fetches work
    if (data.token) localStorage.setItem('cart_token', data.token);

    renderCart(data.items || []);
  } catch (err) {
    showError('Could not load your cart. Please refresh the page.');
    console.error('fetchCart error:', err);
  } finally {
    showLoading(false);
  }
}

      // ── REMOVE ITEM ───────────────────────────────────────
      async function removeItem(pid, size, title) {
        if (!confirm(`Remove "${title}" from your cart?`)) return;
        try {
          const data = await workerFetch('/cart/remove', {
            method: 'POST',
            body: JSON.stringify({ pid, size }),
          });
          renderCart(data.cart?.items || []);
          showToast('Item removed');
        } catch (err) {
          showError('Could not remove item. Please try again.');
        }
      }

      // ── UPDATE QUANTITY ───────────────────────────────────
      async function updateQuantity(pid, size, newQty) {
        newQty = Math.max(1, parseInt(newQty) || 1);
        try {
          const data = await workerFetch('/cart/update', {
            method: 'POST',
            body: JSON.stringify({ pid, size, qty: newQty }),
          });
          renderCart(data.cart?.items || []);
        } catch (err) {
          showError('Could not update quantity. Please try again.');
        }
      }

      // ── RENDER CART ───────────────────────────────────────
      function renderCart(items) {
        const loading   = document.getElementById('cartLoading');
        const empty     = document.getElementById('emptyCartMessage');
        const content   = document.getElementById('cartContent');
        const container = document.getElementById('cartItemsContainer');

        loading.style.display  = 'none';

        if (!items || items.length === 0) {
          empty.style.display   = 'block';
          content.style.display = 'none';
          updateSummary([]);
          return;
        }

        empty.style.display   = 'none';
        content.style.display = 'grid';

        container.innerHTML = items.map(item => {
          const qty      = item.qty || 1;
          const price    = Number(item.price) || 0;
          const lineTotal = price * qty;
          const imgSrc   = item.imageUrl || 'https://via.placeholder.com/120/965000/FFFFFF?text=Product';
          // Encode pid/size as data attrs to avoid quote issues in onclick
          return `
            <div class="cart-item"
                 data-pid="${escHtml(item.pid)}"
                 data-size="${escHtml(item.size || '')}">
              <img src="${escHtml(imgSrc)}" alt="${escHtml(item.name || '')}" class="item-image" />

              <div class="item-details">
                <div>
                  <h3 class="item-title">${escHtml(item.name || 'Product')}</h3>
                  <p class="item-variant">${escHtml(item.subname || item.size || '')}</p>
                  <p class="item-price">R ${price.toFixed(2)}</p>
                </div>
                <div class="quantity-controls">
                  <button class="qty-btn" onclick="changeQty(this, -1)" aria-label="Decrease quantity">−</button>
                  <input type="number" class="qty-input" value="${qty}" min="1"
                         onchange="changeQtyInput(this)" aria-label="Quantity" />
                  <button class="qty-btn" onclick="changeQty(this, 1)" aria-label="Increase quantity">+</button>
                </div>
              </div>

              <div class="item-actions">
                <button class="remove-btn"
                        onclick="removeFromRow(this)"
                        title="Remove item"
                        aria-label="Remove ${escHtml(item.name || 'item')}">×</button>
                <div class="item-total">R ${lineTotal.toFixed(2)}</div>
              </div>
            </div>
          `;
        }).join('');

        updateSummary(items);

        // Keep header badge in sync
        const totalQty = items.reduce((s, i) => s + (i.qty || 1), 0);
        const badge = document.getElementById('headerCartQty');
        if (badge) badge.textContent = totalQty;
      }

      // ── DOM EVENT HELPERS (read pid/size from parent row) ─
      function getRowData(el) {
        const row = el.closest('.cart-item');
        return { pid: row.dataset.pid, size: row.dataset.size };
      }

      function changeQty(btn, delta) {
        const row  = btn.closest('.cart-item');
        const input = row.querySelector('.qty-input');
        const { pid, size } = getRowData(btn);
        const newQty = Math.max(1, parseInt(input.value || 1) + delta);
        input.value = newQty;
        updateQuantity(pid, size, newQty);
      }

      function changeQtyInput(input) {
        const { pid, size } = getRowData(input);
        updateQuantity(pid, size, input.value);
      }

      function removeFromRow(btn) {
        const row   = btn.closest('.cart-item');
        const title = row.querySelector('.item-title')?.textContent || 'this item';
        const { pid, size } = getRowData(btn);
        removeItem(pid, size, title);
      }

      // ── SUMMARY ───────────────────────────────────────────
      function updateSummary(items) {
        const subtotal  = items.reduce((s, i) => s + (Number(i.price) || 0) * (i.qty || 1), 0);
        const itemCount = items.reduce((s, i) => s + (i.qty || 1), 0);
        const discounted = Math.max(0, subtotal - promoDiscount);

        document.getElementById('itemCount').textContent = `(${itemCount})`;
        document.getElementById('subtotal').textContent  = `R ${subtotal.toFixed(2)}`;
        document.getElementById('total').textContent     = `R ${discounted.toFixed(2)}`;

        if (promoDiscount > 0) {
          document.getElementById('discountRow').style.display = 'flex';
          document.getElementById('discount').textContent = `-R ${promoDiscount.toFixed(2)}`;
        }
      }

      // ── PROMO CODE ────────────────────────────────────────
      function applyPromo() {
        const code = document.getElementById('promoInput').value.trim().toUpperCase();
        // Hardcoded demo promo — swap for a Worker endpoint call if needed
        if (code === 'SAVE10') {
          const subtotal = parseFloat(
            document.getElementById('subtotal').textContent.replace('R ', '')
          ) || 0;
          promoDiscount = subtotal * 0.1;
          showToast('Promo applied: 10% off!');
          updateSummary([]); // re-render totals only (items already rendered)
          // Re-fetch to get accurate item list for subtotal reference
          fetchCart();
        } else if (code) {
          showToast('Invalid promo code. Try "SAVE10".');
        }
      }

      // ── CHECKOUT ──────────────────────────────────────────
      function proceedToCheckout() {
        const btn = document.getElementById('checkoutBtn');
        const qty = parseInt(document.getElementById('itemCount').textContent.replace(/\D/g,'')) || 0;
        if (qty === 0) { showToast('Your cart is empty!'); return; }
        btn.disabled = true;
        btn.textContent = 'Redirecting…';
        // Replace with your actual Shopify or checkout URL
        setTimeout(() => {
          window.location.href = '/checkout.html';
        }, 800);
      }

      // ── UI STATE HELPERS ──────────────────────────────────
      function showLoading(on) {
        document.getElementById('cartLoading').style.display = on ? 'block' : 'none';
      }

      function showError(msg) {
        const el = document.getElementById('cartError');
        el.textContent = msg;
        el.style.display = msg ? 'block' : 'none';
      }

      function clearError() { showError(''); }

      // Simple HTML-escape to avoid XSS in item data
      function escHtml(str) {
        return String(str ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ── INIT ──────────────────────────────────────────────
      fetchCart();
    </script>

    <!-- Localization script (keep your existing one) -->
    <script>
      const countryCurrencyMap = {
        ZA:{name:"South Africa",currency:"ZAR",symbol:"R",lang:"EN"},
        US:{name:"United States",currency:"USD",symbol:"$",lang:"EN"},
        GB:{name:"United Kingdom",currency:"GBP",symbol:"£",lang:"EN"},
        EU:{name:"European Union",currency:"EUR",symbol:"€",lang:"EN"},
        AU:{name:"Australia",currency:"AUD",symbol:"A$",lang:"EN"},
        CA:{name:"Canada",currency:"CAD",symbol:"C$",lang:"EN"},
      };
      let currentCountryCode = localStorage.getItem('selectedCountry') || 'ZA';
      async function initLocalization() {
        try {
          const res  = await fetch('https://ipapi.co/json/');
          const data = await res.json();
          if (!localStorage.getItem('selectedCountry')) {
            currentCountryCode = data.country_code || 'ZA';
          }
        } catch(e) {}
      }
      initLocalization();
    </script>

    <script src="/js/cloudflare-image-loader.js"></script>
  </body>
</html>
